<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>潮汐グラフ（3日間）</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root{--gap:2rem;}
    body{font-family:system-ui,Arial,sans-serif;margin:2rem;background:#f5f7fa;}
    h1{margin-bottom:1rem;}
    form{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:end;}
    .form-group{display:flex;flex-direction:column;gap:4px;}
    .form-group label{font-size:.85rem;font-weight:600;color:#555;}
    select,input[type="date"]{padding:8px;border:1px solid #ccc;border-radius:6px;font-size:15px;}
    button{padding:8px 20px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer;}
    button:hover{background:#1d4ed8;}
    #charts{display:grid;gap:var(--gap);}
    .chart-wrap{background:#fff;padding:16px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.1);}
    .chart-wrap canvas{width:100%!important;height:auto!important;}
    .error{color:#d00;margin-top:.5rem;}
    .hint{font-size:.85rem;color:#555;margin-top:.25rem;}
    #portLabel{font-size:1rem;font-weight:600;}
    @media print{
      @page{size:A4 portrait;margin:8mm 10mm;}
      body{margin:0;font-size:9pt;background:#fff;}
      form,#hint,#err{display:none;}
      h1{margin:0 0 2mm;font-size:12pt;}
      :root{--gap:2mm;}
      #charts{gap:2mm;}
      .chart-wrap{box-shadow:none;padding:1mm 0;break-inside:avoid;}
      .chart-wrap canvas{max-height:75mm;}
    }
  </style>
</head>
<body>

  </div>

    <label for="portSelect">港</label>
    <select id="portSelect" required></select>
  </div>
  <div class="form-group">
    <label for="dateInput">日付</label>
    <input type="date" id="dateInput" required>
  </div>
  <div class="form-group">
    <label>&nbsp;</label>
    <button type="submit">表示</button>
  </div>
  <div class="form-group">
    <label>&nbsp;</label>
    <button type="button" onclick="printCharts()">印刷</button>
  </div>
</form>
<p class="error" id="err"></p>
<p class="hint" id="hint"></p>
<div id="charts"></div>

/**************** DOM refs *****************/
const prefSel = document.getElementById('prefSelect');
const portSel = document.getElementById('portSelect');
const portLbl = document.getElementById('portLabel');
const errEl   = document.getElementById('err');
const hintEl  = document.getElementById('hint');
const chartsDiv = document.getElementById('charts');
let charts = [];

// 都道府県セレクト初期化
prefectures.forEach((p, i) => {
  prefSel.insertAdjacentHTML('beforeend', `<option value="${i}">${p.name}</option>`);
});

// 都道府県変更時 → 港リスト更新
prefSel.addEventListener('change', () => {
  const pref = prefectures[prefSel.value];
  portSel.innerHTML = '';
  if (pref) {
    pref.ports.forEach(p => {
      portSel.insertAdjacentHTML('beforeend', `<option value="${p.hc}">${p.name}</option>`);
    });
  }
});

// 初期値: 愛媛県
prefSel.value = prefectures.findIndex(p => p.pc === 38);
prefSel.dispatchEvent(new Event('change'));
document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

/**************** 極値抽出 *****************/
function peaksTroughs(list, labels) {
  const pk = [], tr = [];
  for (let i = 1; i < list.length - 1; i++) {
    const prev = list[i-1].cm, cur = list[i].cm, next = list[i+1].cm;
    if (cur > prev && cur > next) pk.push({x: labels[i], y: cur});
    if (cur < prev && cur < next) tr.push({x: labels[i], y: cur});
  }
  return {pk, tr};
}

/**************** API呼び出し *****************/
async function fetchTide(pc, hc, date) {
  const y  = date.getFullYear();
  const m  = String(date.getMonth() + 1).padStart(2, '0');
  const dy = String(date.getDate()).padStart(2, '0');
  const url = `/api/tide?pc=${pc}&hc=${hc}&yr=${y}&mn=${m}&dy=${dy}&rg=day`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  const j = await res.json();
  if (j.error) throw new Error(j.error);
  if (j.status !== 1) throw new Error(j.message || 'APIエラー');
  return j;
}

/**************** フォントサイズ設定 *****************/
const FONT_SCREEN = {title: 18, legend: 15, tick: 12, axisTitle: 12};
const FONT_PRINT  = {title: 28, legend: 22, tick: 18, axisTitle: 18};
let fontSizes = FONT_SCREEN;

/**************** 描画 *****************/
async function draw() {
  errEl.textContent = '';
  hintEl.textContent = '読み込み中…';
  charts.forEach(c => c.destroy());
  charts = [];
  chartsDiv.innerHTML = '';

  const pref = prefectures[prefSel.value];
  const hc = portSel.value;
  const portName = portSel.selectedOptions[0].textContent;
  portLbl.textContent = `（${pref.name} ${portName}）`;

  const baseDate = new Date(document.getElementById('dateInput').value);

  try {
    for (let offset = -1; offset <= 1; offset++) {
      const d = new Date(baseDate);
      d.setDate(d.getDate() + offset);

      const j = await fetchTide(pref.pc, hc, d);
      const dateKey = Object.keys(j.tide.chart)[0];
      const dayData = j.tide.chart[dateKey];
      const list = dayData.tide;
      const labels = list.map(t => t.time);
      const data = list.map(t => t.cm);
      const {pk, tr} = peaksTroughs(list, labels);

      // 潮名・月齢情報
      const moonTitle = dayData.moon?.title || '';
      const moonAge = dayData.moon?.age != null ? `月齢${dayData.moon.age}` : '';
      const sunRise = dayData.sun?.rise || '';
      const sunSet  = dayData.sun?.set || '';
      const dayLabel = offset === -1 ? '前日' : offset === 0 ? '指定日' : '翌日';
      const subtitle = [moonTitle, moonAge, sunRise ? `日出${sunRise}` : '', sunSet ? `日没${sunSet}` : ''].filter(Boolean).join(' / ');

      const wrap = document.createElement('div');
      wrap.className = 'chart-wrap';
      const canvas = document.createElement('canvas');
      wrap.appendChild(canvas);
      chartsDiv.appendChild(wrap);

      charts.push(new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            {label: '潮位(cm)', data, borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,.08)', borderWidth: 2.5, pointRadius: 0, tension: .2, fill: true},
            {type: 'scatter', label: '満潮', data: pk, pointRadius: 6, backgroundColor: '#dc2626', borderColor: '#dc2626'},
            {type: 'scatter', label: '干潮', data: tr, pointStyle: 'rectRot', pointRadius: 6, backgroundColor: '#0284c7', borderColor: '#0284c7'}
          ]
        },
        options: {
          maintainAspectRatio: true,
          plugins: {
            title: {display: true, text: `${dateKey}（${dayLabel}）  ${subtitle}`, align: 'start', font: {size: fontSizes.title, weight: 'bold'}},
            legend: {labels: {boxWidth: 14, font: {size: fontSizes.legend}}},
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label === '潮位(cm)' ? '' : ctx.dataset.label + ': '}${ctx.formattedValue} cm`
              }
            }
          },
          interaction: {mode: 'nearest', axis: 'x', intersect: false},
          scales: {
            x: {title: {display: true, text: '時刻', font: {size: fontSizes.axisTitle}}, ticks: {autoSkip: false, color: '#333', font: {size: fontSizes.tick}, callback: v => labels[v]?.endsWith(':00') ? labels[v] : ''}, grid: {color: '#e5e7eb'}},
            y: {title: {display: true, text: '潮位(cm)', font: {size: fontSizes.axisTitle}}, ticks: {color: '#333', font: {size: fontSizes.tick}}, grid: {color: '#e5e7eb'}}
          }
        }
      }));
    }
    hintEl.textContent = '';
  } catch (e) {
    hintEl.textContent = '';
    errEl.textContent = 'データ取得失敗: ' + e.message;
  }
}

document.getElementById('ctrl').addEventListener('submit', e => { e.preventDefault(); draw(); });

/**************** 印刷用：大フォントで再描画→印刷→戻す *****************/
async function printCharts() {
  if (!charts.length) { alert('先にグラフを表示してください'); return; }
  fontSizes = FONT_PRINT;
  await draw();
  // 描画完了を待ってから印刷
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      window.print();
      // 印刷ダイアログ閉じた後に画面用に戻す
      fontSizes = FONT_SCREEN;
      draw();
    });
  });
}

// 初回表示
draw();
</script>
